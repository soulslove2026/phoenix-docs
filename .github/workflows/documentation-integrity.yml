name: Documentation Integrity

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate repository authority, traceability, manifest, and checksums
        run: node scripts/check-repository.mjs
